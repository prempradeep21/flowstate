name: FlowstateMobile
options:
  bundleIdPrefix: com.flowstate
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.5.1"

settings:
  base:
    # Real values live in Config/Secrets.xcconfig (git-ignored).
    # Copy Config/Secrets.example.xcconfig -> Config/Secrets.xcconfig and fill in.
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  FlowstateMobile:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    sources:
      - path: FlowstateMobile
    settings:
      base:
        INFOPLIST_FILE: FlowstateMobile/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ravisalugu.flowstate
        DEVELOPMENT_TEAM: W6V795295F
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Supabase
        product: Supabase
