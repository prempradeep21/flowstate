<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowstate — Spec Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
          <div class="logo-mark" aria-hidden="true"></div>
          <div>
            <p class="eyebrow">Flowstate</p>
            <h1 class="sidebar-title">Spec Viewer</h1>
          </div>
        </header>

        <div class="search-wrap">
          <input
            type="search"
            id="search"
            class="search-input"
            placeholder="Search sections…"
            autocomplete="off"
          />
        </div>

        <nav class="nav" id="nav" aria-label="Spec sections"></nav>

        <footer class="sidebar-footer">
          <p>Source: <code>branch-ai.md</code></p>
          <p class="muted">Personal reference — not part of the app</p>
        </footer>
      </aside>

      <button
        type="button"
        class="sidebar-toggle"
        id="sidebar-toggle"
        aria-label="Toggle navigation"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <main class="main" id="main">
        <div class="hero" id="hero"></div>
        <div class="sections" id="sections"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
